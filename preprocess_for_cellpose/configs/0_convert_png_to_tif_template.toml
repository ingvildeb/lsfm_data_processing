input_dir = 'Z:/PATH/TO/PNG_FOLDER'
output_dir = 'Z:/PATH/TO/OUTPUT_TIF_FOLDER'

# -------- CONVERSION SETTINGS --------

# conversion_mode:
# - "format_only" preserves the RGB image and only changes the file format
# - "single_channel" extracts one RGB channel
# - "grayscale" applies a standard RGB -> grayscale conversion
conversion_mode = "single_channel"

# -------- CHANNEL SETTINGS --------

# Channel index after RGB loading with PIL:
# 0 = red, 1 = green, 2 = blue
# Only used when conversion_mode = "single_channel"
channel = 2

# Set to true to invert intensities after channel extraction or grayscale conversion.
invert_output = false

# -------- ADVANCED --------

recursive = false   # set to true to convert PNG files inside subfolders too
overwrite = false   # set to true to overwrite existing TIFF outputs
